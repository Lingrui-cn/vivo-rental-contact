<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  min-height:100vh;min-height:100dvh;
  background:#060a18;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:-apple-system,PingFang SC,Helvetica Neue,sans-serif;
  color:#fff;padding:48px 20px 40px;
  position:relative;overflow-x:hidden
}
/* breathing glow background */
.bg-glow{
  position:fixed;top:0;left:0;width:100%;height:100%;
  pointer-events:none;z-index:0
}
.glow-orb{
  position:absolute;border-radius:50%;filter:blur(120px);
  animation:breath 6s ease-in-out infinite
}
.orb1{
  width:500px;height:500px;
  background:radial-gradient(circle,rgba(65,95,255,.25),transparent 70%);
  top:15%;left:50%;transform:translateX(-50%);
  animation-delay:0s
}
.orb2{
  width:400px;height:400px;
  background:radial-gradient(circle,rgba(0,180,255,.18),transparent 70%);
  bottom:10%;right:10%;
  animation-delay:2s
}
.orb3{
  width:350px;height:350px;
  background:radial-gradient(circle,rgba(65,95,255,.12),transparent 70%);
  top:50%;left:5%;
  animation-delay:4s
}
@keyframes breath{
  0%,100%{opacity:.4;transform:scale(1) translateX(var(--tx,0))}
  50%{opacity:1;transform:scale(1.15) translateX(var(--tx,0))}
}
.orb1{--tx:-50%}

/* noise overlay */
.bg-glow::after{
  content:'';position:absolute;inset:0;
  background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.03'/%3E%3C/svg%3E");
  opacity:.5;mix-blend-mode:overlay
}

.content{position:relative;z-index:1;text-align:center}
.header{margin-bottom:32px}
.header h1{
  font-size:12px;font-weight:500;letter-spacing:4px;
  color:rgba(255,255,255,.25);margin-bottom:8px;
  text-transform:uppercase
}
.header .brand{
  font-size:24px;font-weight:700;
  letter-spacing:1px;line-height:1.4
}
.header .brand span{color:rgba(255,255,255,.45);font-weight:400}
.header .desc{
  margin-top:12px;font-size:13px;
  color:rgba(255,255,255,.3);letter-spacing:.5px
}
.screenshot-wrap{
  width:100%;max-width:340px;margin:0 auto;
  border-radius:20px;overflow:hidden;
  box-shadow:0 8px 60px rgba(65,95,255,.15);
  background:rgba(255,255,255,.02);
  border:1px solid rgba(65,95,255,.1);
  transition:box-shadow .4s
}
.screenshot-wrap:hover{
  box-shadow:0 8px 80px rgba(65,95,255,.25)
}
.screenshot-wrap img{
  width:100%;height:auto;display:block
}
.footer{
  margin-top:28px;text-align:center;
  font-size:12px;color:rgba(255,255,255,.2);
  letter-spacing:1px
}

/* doc button */
.doc-btn{
  display:inline-flex;align-items:center;gap:10px;
  margin-top:28px;padding:14px 28px;
  background:linear-gradient(135deg,rgba(65,95,255,.15),rgba(0,180,255,.1));
  border:1px solid rgba(65,95,255,.25);
  border-radius:14px;
  color:#fff;text-decoration:none;
  font-size:14px;font-weight:500;letter-spacing:.5px;
  backdrop-filter:blur(12px);
  transition:all .3s;
  cursor:pointer
}
.doc-btn:hover{
  background:linear-gradient(135deg,rgba(65,95,255,.25),rgba(0,180,255,.18));
  border-color:rgba(65,95,255,.45);
  box-shadow:0 4px 30px rgba(65,95,255,.2);
  transform:translateY(-1px)
}
.doc-btn:active{transform:translateY(0)}
.doc-btn .icon{
  width:20px;height:20px;
  background:rgba(65,95,255,.3);border-radius:5px;
  display:flex;align-items:center;justify-content:center;
  font-size:12px
}
.doc-btn .arrow{
  font-size:12px;color:rgba(255,255,255,.4);
  transition:transform .2s
}
.doc-btn:hover .arrow{transform:translateX(3px)}
</style>
