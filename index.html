<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>vivo官方租赁 - 联系我们</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  min-height:100vh;min-height:100dvh;
  background:#060a18;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:-apple-system,PingFang SC,Helvetica Neue,sans-serif;
  color:#fff;padding:48px 20px 40px;
  position:relative;overflow-x:hidden
}

/* breathing glow background */
.bg-glow{
  position:fixed;top:0;left:0;width:100%;height:100%;
  pointer-events:none;z-index:0
}
.glow-orb{
  position:absolute;border-radius:50%;filter:blur(120px);
  animation:breath 8s ease-in-out infinite
}
.orb1{
  width:500px;height:500px;
  background:radial-gradient(circle,rgba(65,95,255,.2),transparent 70%);
  top:10%;left:50%;transform:translateX(-50%);
  animation-delay:0s
}
.orb2{
  width:400px;height:400px;
  background:radial-gradient(circle,rgba(0,180,255,.14),transparent 70%);
  bottom:5%;right:5%;
  animation-delay:3s
}
.orb3{
  width:350px;height:350px;
  background:radial-gradient(circle,rgba(65,95,255,.1),transparent 70%);
  top:55%;left:0%;
  animation-delay:5s
}
@keyframes breath{
  0%,100%{opacity:.3;transform:scale(1) translateX(var(--tx,0))}
  50%{opacity:.9;transform:scale(1.12) translateX(var(--tx,0))}
}
.orb1{--tx:-50%}

/* noise overlay */
.bg-glow::after{
  content:'';position:absolute;inset:0;
  background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.03'/%3E%3C/svg%3E");
  opacity:.4;mix-blend-mode:overlay;pointer-events:none
}

.content{position:relative;z-index:1;text-align:center}

/* header */
.header{margin-bottom:32px}
.header h1{
  font-size:12px;font-weight:500;letter-spacing:4px;
  color:rgba(255,255,255,.2);margin-bottom:8px;
  white-space:nowrap
}
.header .brand{
  font-size:24px;font-weight:700;
  letter-spacing:1px;line-height:1.4;
  white-space:nowrap
}
.header .brand span{color:rgba(255,255,255,.45);font-weight:400}
.header .desc{
  margin-top:12px;font-size:13px;
  color:rgba(255,255,255,.3);letter-spacing:.5px;
  white-space:nowrap
}

/* screenshot card - liquid glass */
.card{
  width:100%;max-width:340px;margin:0 auto;
  border-radius:20px;overflow:hidden;
  position:relative;
  /* liquid glass */
  background:rgba(255,255,255,.035);
  backdrop-filter:blur(16px) saturate(1.4);
  -webkit-backdrop-filter:blur(16px) saturate(1.4);
  border:1px solid rgba(255,255,255,.08);
  box-shadow:
    inset 1px -1px 1px rgba(255,255,255,.1),
    inset -1px 1px 1px rgba(255,255,255,.06),
    inset 0 0 20px rgba(65,95,255,.04),
    0 8px 60px rgba(65,95,255,.12),
    0 0 0 1px rgba(65,95,255,.06);
  transition:box-shadow .6s ease
}
/* breathing glow ring around card */
.card::before{
  content:'';position:absolute;
  inset:-3px;border-radius:23px;
  background:linear-gradient(135deg,
    rgba(65,95,255,.3),
    rgba(0,180,255,.15),
    rgba(65,95,255,.2),
    rgba(0,212,255,.1)
  );
  z-index:-1;
  filter:blur(12px);
  animation:cardGlow 6s ease-in-out infinite;
  opacity:.5
}
@keyframes cardGlow{
  0%,100%{opacity:.3;filter:blur(12px)}
  50%{opacity:.8;filter:blur(18px)}
}
.card:hover{
  box-shadow:
    inset 1px -1px 1px rgba(255,255,255,.12),
    inset -1px 1px 1px rgba(255,255,255,.08),
    inset 0 0 30px rgba(65,95,255,.06),
    0 8px 80px rgba(65,95,255,.22),
    0 0 0 1px rgba(65,95,255,.12)
}
.card img{
  width:100%;height:auto;display:block;
  position:relative;z-index:1
}
/* glass highlight strip */
.card::after{
  content:'';position:absolute;
  top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,
    transparent 0%,
    rgba(255,255,255,.15) 40%,
    rgba(255,255,255,.25) 50%,
    rgba(255,255,255,.15) 60%,
    transparent 100%
  );
  border-radius:20px 20px 0 0;
  z-index:2
}

.footer{
  margin-top:28px;text-align:center;
  font-size:12px;color:rgba(255,255,255,.2);
  letter-spacing:1px;white-space:nowrap
}

/* doc button - liquid glass */
.doc-btn{
  display:inline-flex;align-items:center;gap:10px;
  margin-top:28px;padding:14px 28px;
  border-radius:14px;
  color:#fff;text-decoration:none;
  font-size:14px;font-weight:500;letter-spacing:.5px;
  white-space:nowrap;
  position:relative;overflow:hidden;
  cursor:pointer;
  /* liquid glass */
  background:rgba(65,95,255,.1);
  backdrop-filter:blur(12px) saturate(1.3);
  -webkit-backdrop-filter:blur(12px) saturate(1.3);
  border:1px solid rgba(65,95,255,.2);
  box-shadow:
    inset 1px -1px 1px rgba(255,255,255,.08),
    inset -1px 1px 1px rgba(255,255,255,.05),
    0 2px 20px rgba(65,95,255,.1);
  transition:all .35s ease
}
.doc-btn:hover{
  background:rgba(65,95,255,.18);
  border-color:rgba(65,95,255,.35);
  box-shadow:
    inset 1px -1px 1px rgba(255,255,255,.1),
    0 4px 30px rgba(65,95,255,.18);
  transform:translateY(-1px)
}
.doc-btn:active{transform:translateY(0)}
.doc-btn .icon{
  width:20px;height:20px;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;flex-shrink:0
}
.doc-btn .arrow{
  font-size:12px;color:rgba(255,255,255,.4);
  transition:transform .2s;flex-shrink:0
}
.doc-btn:hover .arrow{transform:translateX(3px)}

/* shimmer sweep */
.doc-btn .shimmer{
  position:absolute;inset:0;
  background:linear-gradient(
    105deg,
    transparent 20%,
    rgba(255,255,255,.12) 45%,
    rgba(255,255,255,.2) 50%,
    rgba(255,255,255,.12) 55%,
    transparent 80%
  );
  background-size:300% 100%;
  animation:shimmer 4s ease-in-out infinite;
  border-radius:inherit;
  pointer-events:none
}
@keyframes shimmer{
  0%{background-position:200% 0}
  100%{background-position:-200% 0}
}
</style>
